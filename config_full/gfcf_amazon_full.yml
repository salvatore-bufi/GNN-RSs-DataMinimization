experiment:
  backend: pytorch
  data_config:
    strategy: fixed
    train_path: ../data/amazon-book/train.tsv
    validation_path: ../data/amazon-book/val.tsv
    test_path: ../data/amazon-book/test.tsv
  dataset: amazonbook_full
  top_k: 20
  evaluation:
    cutoffs: [20]
    simple_metrics: [nDCGRendle2020, Recall]
  gpu: 1
  external_models_path: ../external/models/__init__.py
  models:
    external.GFCF:
      meta:
        hyper_opt_alg: tpe
        hyper_max_evals: 10
        verbose: True
        save_weights: False
        validation_metric: Recall@20
        restore: False
        write_best_iterations: True
      svd_factors: [choice, [64, 128, 256]]
      alpha: [loguniform, -2.30258509299, -0.22314355131]
      seed: 123

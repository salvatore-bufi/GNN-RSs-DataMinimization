experiment:
  backend: pytorch
  data_config:
    strategy: fixed
    train_path: ../data/amazon-book/train.tsv
    validation_path: ../data/amazon-book/val.tsv
    test_path: ../data/amazon-book/test.tsv
  dataset: amazonbook_full
  top_k: 20
  evaluation:
    cutoffs: [20]
    simple_metrics: [nDCGRendle2020, Recall]
  gpu: 1
  external_models_path: ../external/models/__init__.py
  models:
    external.DirectAU:
      meta:
        hyper_opt_alg: tpe
        hyper_max_evals: 10
        verbose: True
        save_weights: False
        validation_rate: 10
        validation_metric: Recall@20
        restore: False
        write_best_iterations: True
      lr: [loguniform, -9.2103403719762, -4.6051701859881]
      epochs: 1000
      factors: [ 64 ]
      batch_size: 1024
      l_w: [loguniform, -13.815510558, -4.60517018599]
      gamma: [loguniform, -1.609437912 ,1.609437912] # [0.2 - 5.0]
      seed: 123
      early_stopping:
        patience: 10
        mode: auto
        monitor: Recall@20
        verbose: True
